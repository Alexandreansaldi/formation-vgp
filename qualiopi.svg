<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 130" width="320" height="130">
  <!-- Background -->
  <rect width="320" height="130" fill="white" rx="4"/>
  <!-- Left border accent (French flag colors) -->
  <rect x="0" y="0" width="7" height="130" fill="#002395" rx="2"/>
  <rect x="7" y="0" width="7" height="130" fill="white"/>
  <rect x="14" y="0" width="7" height="130" fill="#ED2939"/>

  <!-- Qualiopi text -->
  <text x="34" y="62" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="900" fill="#1a237e" letter-spacing="-1">Qualiopi</text>

  <!-- Two red chevron arrows -->
  <!-- Arrow 1 -->
  <polygon points="258,28 278,55 258,82" fill="#C0392B" opacity="0.9"/>
  <!-- Arrow 2 -->
  <polygon points="275,28 295,55 275,82" fill="#C0392B"/>

  <!-- processus certifié -->
  <text x="34" y="84" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#1a237e">processus certifié</text>

  <!-- Divider line -->
  <line x1="22" y1="95" x2="310" y2="95" stroke="#cccccc" stroke-width="1"/>

  <!-- French flag mini -->
  <rect x="22" y="103" width="8" height="16" fill="#002395"/>
  <rect x="30" y="103" width="8" height="16" fill="white" stroke="#ddd" stroke-width="0.5"/>
  <rect x="38" y="103" width="8" height="16" fill="#ED2939"/>

  <!-- RÉPUBLIQUE FRANÇAISE -->
  <text x="52" y="116" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#1a237e" letter-spacing="0.5">RÉPUBLIQUE FRANÇAISE</text>
</svg>
